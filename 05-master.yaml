apiVersion: v1
kind: Pod
metadata:
  name: hadoop-master
  namespace: hadoop
  labels:
    app: hadoop-master
spec:
  hostname: hadoop-master
  restartPolicy: Always
  initContainers:
  - name: fix-permissions
    image: busybox
    command: ['sh', '-c', 'mkdir -p /data/hdfs/namenode && chown -R 1000:1000 /data/hdfs']
    volumeMounts:
    - name: namenode-storage
      mountPath: /data/hdfs/namenode
  containers:
  - name: hadoop
    image: apache/hadoop:3
    command:
    - /bin/bash
    - -c
    - |
      export HADOOP_HOME=/opt/hadoop
      export PATH=$PATH:$HADOOP_HOME/bin:$HADOOP_HOME/sbin

      cp /config/core-site.xml $HADOOP_HOME/etc/hadoop/core-site.xml
      cp /config/hdfs-site.xml $HADOOP_HOME/etc/hadoop/hdfs-site.xml
      cp /config/mapred-site.xml $HADOOP_HOME/etc/hadoop/mapred-site.xml
      cp /config/yarn-site.xml $HADOOP_HOME/etc/hadoop/yarn-site.xml
      cp /config/workers $HADOOP_HOME/etc/hadoop/workers

      mkdir -p /tmp/hadoopdata /data/hdfs/namenode

      # Chỉ format nếu chưa có dữ liệu (lần đầu tiên)
      if [ ! -f /data/hdfs/namenode/current/VERSION ]; then
        echo ">>> First run: Formatting NameNode..."
        $HADOOP_HOME/bin/hdfs namenode -format -force
      else
        echo ">>> Data exists: Skipping format, reusing existing HDFS data"
      fi

      echo ">>> Starting NameNode..."
      $HADOOP_HOME/bin/hdfs --daemon start namenode
      sleep 3

      echo ">>> Starting SecondaryNameNode..."
      $HADOOP_HOME/bin/hdfs --daemon start secondarynamenode
      sleep 2

      echo ">>> Starting ResourceManager..."
      $HADOOP_HOME/bin/yarn --daemon start resourcemanager
      sleep 3

      echo ">>> Starting JobHistoryServer..."
      $HADOOP_HOME/bin/mapred --daemon start historyserver

      echo ">>> All master services started!"
      ps aux | grep -E "NameNode|ResourceManager|JobHistory|SecondaryNameNode" | grep -v grep

      tail -f /dev/null
    ports:
    - containerPort: 9000
    - containerPort: 9870
    - containerPort: 8088
    - containerPort: 19888
    volumeMounts:
    - name: config
      mountPath: /config
    - name: namenode-storage
      mountPath: /data/hdfs/namenode
  volumes:
  - name: config
    configMap:
      name: hadoop-config
  - name: namenode-storage
    persistentVolumeClaim:
      claimName: hadoop-namenode-pvc
