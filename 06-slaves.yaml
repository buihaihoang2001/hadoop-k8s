apiVersion: v1
kind: Pod
metadata:
  name: hadoop-slave01
  namespace: hadoop
  labels:
    app: hadoop-slave01
spec:
  hostname: hadoop-slave01
  restartPolicy: Always
  initContainers:
  - name: fix-permissions
    image: busybox
    command: ['sh', '-c', 'mkdir -p /data/hdfs/datanode && chown -R 1000:1000 /data/hdfs']
    volumeMounts:
    - name: datanode-storage
      mountPath: /data/hdfs/datanode
  containers:
  - name: hadoop
    image: apache/hadoop:3
    command:
    - /bin/bash
    - -c
    - |
      export HADOOP_HOME=/opt/hadoop
      export PATH=$PATH:$HADOOP_HOME/bin:$HADOOP_HOME/sbin

      cp /config/core-site.xml $HADOOP_HOME/etc/hadoop/core-site.xml
      cp /config/hdfs-site.xml $HADOOP_HOME/etc/hadoop/hdfs-site.xml
      cp /config/yarn-site.xml $HADOOP_HOME/etc/hadoop/yarn-site.xml

      mkdir -p /data/hdfs/datanode

      echo ">>> Waiting for NameNode to be ready..."
      sleep 15

      echo ">>> Starting DataNode..."
      $HADOOP_HOME/bin/hdfs --daemon start datanode
      sleep 2

      echo ">>> Starting NodeManager..."
      $HADOOP_HOME/bin/yarn --daemon start nodemanager

      echo ">>> Slave01 started!"
      ps aux | grep -E "DataNode|NodeManager" | grep -v grep

      tail -f /dev/null
    volumeMounts:
    - name: config
      mountPath: /config
    - name: datanode-storage
      mountPath: /data/hdfs/datanode
  volumes:
  - name: config
    configMap:
      name: hadoop-config
  - name: datanode-storage
    persistentVolumeClaim:
      claimName: hadoop-datanode1-pvc
---
